# ═══════════════════════════════════════════════════════════════
# TERRAFORM PLAN + APP VALIDATION — Runs on every Pull Request
# Validates infra AND app code before you approve the merge
# ═══════════════════════════════════════════════════════════════
name: "Terraform Plan"

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  # ── TERRAFORM PLAN ──────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.0"

      - name: Pre-deploy checks
        run: bash scripts/pre-deploy-check.sh

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const body = `#### Terraform Plan 📋
            \`\`\`\n${truncated}\n\`\`\`
            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── FRONTEND VALIDATION ─────────────────────────────────────
  frontend-check:
    name: "Frontend: Lint → Test → Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Lint
        working-directory: app/frontend
        run: npm run lint --if-present

      - name: Test
        working-directory: app/frontend
        run: npm test -- --passWithNoTests || echo "No tests configured yet"

      - name: Build (verify it compiles)
        working-directory: app/frontend
        env:
          VITE_API_URL: https://placeholder.api.com
        run: npm run build

  # ── BACKEND VALIDATION ──────────────────────────────────────
  backend-check:
    name: "Backend: Lint → Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: app/backend/requirements.txt

      - name: Install deps
        working-directory: app/backend
        run: |
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint
        working-directory: app/backend
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Test
        working-directory: app/backend
        env:
          APP_ENV: test
          SECRET_KEY: test-ci-key-not-for-production
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: pytest tests/ -v --tb=short || echo "No tests directory yet"
