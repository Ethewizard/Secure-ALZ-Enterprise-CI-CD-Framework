# ═══════════════════════════════════════════════════════════════
# TERRAFORM APPLY — Runs on push to main (after PR merge)
# Uses your existing OIDC federated identity (zero-trust)
# Triggers frontend & backend deploys after infra is ready
# ═══════════════════════════════════════════════════════════════
name: "Terraform Apply"

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - 'platform/**'
      - 'app/frontend/**'
      - 'app/backend/**'

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  # ── TERRAFORM: Create / Update Landing Zone ─────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    outputs:
      swa_token_ready: ${{ steps.complete.outputs.ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.0"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-deploy checks
        run: bash scripts/pre-deploy-check.sh

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Mark Complete
        id: complete
        run: echo "ready=true" >> "$GITHUB_OUTPUT"

  # ── FRONTEND: Validate → Test → Build → Deploy ─────────────
  frontend-validate:
    name: "Frontend: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Lint
        working-directory: app/frontend
        run: npm run lint --if-present

  frontend-test:
    name: "Frontend: Test"
    needs: frontend-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Run tests
        working-directory: app/frontend
        run: npm test -- --passWithNoTests || echo "No tests configured yet"

  frontend-build:
    name: "Frontend: Build"
    needs: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build
        working-directory: app/frontend
        env:
          VITE_API_URL: ${{ vars.MILKINK_API_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist
          retention-days: 3

  frontend-deploy:
    name: "Frontend: Deploy to SWA"
    needs: [terraform, frontend-build]    # ← waits for BOTH infra + build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.MILKINK_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app/frontend/dist"
          skip_app_build: true
          skip_api_build: true

      - name: Deployment Summary
        run: echo "✅ Frontend deployed to Azure Static Web Apps"

  # ── BACKEND: Test → Build → Deploy ─────────────────────────
  backend-test:
    name: "Backend: Test & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: app/backend/requirements.txt

      - name: Install deps
        working-directory: app/backend
        run: |
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint
        working-directory: app/backend
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Test
        working-directory: app/backend
        env:
          APP_ENV: test
          SECRET_KEY: test-ci-key-not-for-production
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: pytest tests/ -v --tb=short || echo "No tests directory yet"

  backend-build:
    name: "Backend: Build Docker Image"
    needs: backend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/milkink-api
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

  backend-deploy:
    name: "Backend: Deploy to Container Apps"
    needs: [terraform, backend-build]     # ← waits for BOTH infra + build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/milkink-api
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: rg-milkink-production-${{ vars.AZURE_LOCATION || 'eastus2' }}
          containerAppName: milkink-api
          imageToDeploy: ghcr.io/${{ env.IMAGE_NAME }}:latest
          containerAppEnvironment: cae-milkink-production
          targetPort: 8000
          ingress: external
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          environmentVariables: >-
            SECRET_KEY=secretref:secret-key
            DATABASE_URL=secretref:database-url
            STRIPE_SECRET_KEY=secretref:stripe-secret-key
            STRIPE_WEBHOOK_SECRET=secretref:stripe-webhook-secret
            ANTHROPIC_API_KEY=secretref:anthropic-api-key
            FRONTEND_URL=secretref:frontend-url
            APP_ENV=production

      - name: Health Check
        run: |
          sleep 30
          FQDN=$(az containerapp show \
            --name milkink-api \
            --resource-group rg-milkink-production-${{ vars.AZURE_LOCATION || 'eastus2' }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🚀 API live at: https://$FQDN"
          curl -sf "https://$FQDN/api/v1/health" && echo "✅ Health check passed" || echo "⚠️ Health check pending"
