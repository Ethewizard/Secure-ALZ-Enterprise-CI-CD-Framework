# ═══════════════════════════════════════════════════════════════
# MILK & INK FRONTEND — Deploy to Azure Static Web Apps
# Triggers on changes to frontend/ code (separate from infra)
# ═══════════════════════════════════════════════════════════════
name: "Deploy Frontend"

on:
  push:
    branches: [main]
    paths:
      - 'app/frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/frontend/**'

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Lint
        working-directory: app/frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: app/frontend
        env:
          VITE_API_URL: ${{ vars.MILKINK_API_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist
          retention-days: 3

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.MILKINK_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app/frontend/dist"
          skip_app_build: true
          skip_api_build: true
