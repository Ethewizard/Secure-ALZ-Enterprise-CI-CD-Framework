# ═══════════════════════════════════════════════════════════════
# MILK & INK BACKEND — Build, Push, Deploy to Container Apps
# Uses OIDC for Azure auth (same as your infra pipelines)
# ═══════════════════════════════════════════════════════════════
name: "Deploy Backend"

on:
  push:
    branches: [main]
    paths:
      - 'app/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/backend/**'

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/milkink-api

jobs:
  # ── TEST ────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: app/backend/requirements.txt

      - name: Install deps
        working-directory: app/backend
        run: |
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint
        working-directory: app/backend
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Test
        working-directory: app/backend
        env:
          APP_ENV: test
          SECRET_KEY: test-ci-key-not-for-production
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: pytest tests/ -v --tb=short || echo "No tests directory yet"

  # ── BUILD & PUSH DOCKER IMAGE ──────────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ── DEPLOY TO AZURE CONTAINER APPS ─────────────────────────
  deploy:
    name: Deploy to Container Apps
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: rg-milkink-production-${{ vars.AZURE_LOCATION || 'eastus2' }}
          containerAppName: milkink-api
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          containerAppEnvironment: cae-milkink-production
          targetPort: 8000
          ingress: external
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          environmentVariables: >-
            SECRET_KEY=secretref:secret-key
            DATABASE_URL=secretref:database-url
            STRIPE_SECRET_KEY=secretref:stripe-secret-key
            STRIPE_WEBHOOK_SECRET=secretref:stripe-webhook-secret
            ANTHROPIC_API_KEY=secretref:anthropic-api-key
            FRONTEND_URL=secretref:frontend-url
            APP_ENV=production

      - name: Health Check
        run: |
          sleep 30
          FQDN=$(az containerapp show \
            --name milkink-api \
            --resource-group rg-milkink-production-${{ vars.AZURE_LOCATION || 'eastus2' }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🚀 API live at: https://$FQDN"
          curl -sf "https://$FQDN/api/v1/health" && echo "✅ Health check passed" || echo "⚠️ Health check pending"
